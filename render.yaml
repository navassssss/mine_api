services:
  - type: web
    name: mine-kimi-api
    env: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile
    plan: free
    region: ohio
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: LIVE_API_CHAT_ID
        sync: false
