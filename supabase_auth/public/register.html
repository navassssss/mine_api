<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Developer Registration - Mine Kimi API</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <!-- Supabase JS Client CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="glow-container">
    <div class="glow-circle glow-1"></div>
    <div class="glow-circle glow-2"></div>
  </div>

  <header>
    <div class="nav-container">
      <a href="/" class="logo">🚀 Mine Kimi API</a>
      <nav>
        <a href="/">Home</a>
        <a href="/docs">Documentation</a>
        <a href="/models">Models</a>
        <a href="/about">About</a>
        <a href="/login" class="btn-primary">Login</a>
      </nav>
    </div>
  </header>

  <main class="auth-page-wrapper">
    <div class="auth-container">
      <div class="auth-header">
        <h1>Create Account</h1>
        <p>Sign up to access the secure API developer panel</p>
      </div>

      <div id="alert-box" class="alert"></div>

      <form id="register-form" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" placeholder="John Doe" required>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="john@example.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" minlength="6" required>
        </div>

        <div class="grid-2">
          <div class="form-group">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" required>
          </div>

          <div class="form-group">
            <label for="gender">Gender</label>
            <select id="gender" required>
              <option value="">Select...</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="mobileNumber">Mobile Number</label>
          <input type="text" id="mobileNumber" placeholder="+1 (555) 000-0000" required>
        </div>

        <button type="submit" class="btn-submit" id="btn-submit">
          <span>Register Account</span>
        </button>
      </form>

      <div class="auth-footer" id="footer-login-link">
        Already have an account? <a href="/login">Sign In</a>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-container">
      <span style="font-size: 0.9rem; color: var(--text-muted);">&copy; 2026 Mine Kimi. All rights reserved.</span>
      <div class="status-badge">
        <div class="status-dot"></div>
        <span>API Gateway Online</span>
      </div>
      <div class="footer-links">
        <a href="/docs">Docs</a>
        <a href="/models">Models</a>
        <a href="/about">About</a>
      </div>
    </div>
  </footer>

  <script src="/js/supabase-client.js"></script>
  <script src="/js/auth-guard.js"></script>
  <script src="/js/navbar.js"></script>
  <script>
    window.addEventListener('load', () => {
      // Guard: Send already logged-in & verified sessions to dashboard
      checkAuth(false);
    });

    async function handleRegister(e) {
      e.preventDefault();
      const alertBox = document.getElementById('alert-box');
      const submitBtn = document.getElementById('btn-submit');
      const form = document.getElementById('register-form');
      
      alertBox.className = 'alert';
      alertBox.style.display = 'none';

      // 1. Instantly disable the button to prevent multiple form submissions
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span>Registering...</span>';

      const fullName = document.getElementById('fullName').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const dob = document.getElementById('dob').value;
      const gender = document.getElementById('gender').value;
      const mobileNumber = document.getElementById('mobileNumber').value;

      try {
        const client = await getSupabaseClient();
        
        // 2. Call Supabase Sign Up API passing registration data in options.data
        const { data, error } = await client.auth.signUp({
          email,
          password,
          options: {
            emailRedirectTo: `${window.location.origin}/auth/callback`,
            data: {
              full_name: fullName,
              dob: dob,
              gender: gender,
              mobile_number: mobileNumber
            }
          }
        });

        if (error) throw error;

        // 3. Clear and hide form upon success to emphasize completion
        form.style.display = 'none';
        
        alertBox.innerText = 'Registration successful! A verification email has been sent. Please click the link in your email to confirm your account, then click Sign In below to access your dashboard.';
        alertBox.className = 'alert alert-success';
        alertBox.style.display = 'block';
      } catch (err) {
        console.error(err);
        alertBox.innerText = err.message || 'Failed to complete registration.';
        alertBox.className = 'alert alert-error';
        alertBox.style.display = 'block';
        
        // Restore submit button state on failure
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<span>Register Account</span>';
      }
    }
  </script>
</body>
</html>
