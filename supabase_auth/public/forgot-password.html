<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Mine Kimi API</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <!-- Supabase JS Client CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="glow-container">
    <div class="glow-circle glow-1"></div>
    <div class="glow-circle glow-2"></div>
  </div>

  <header>
    <div class="nav-container">
      <a href="/" class="logo">🚀 Mine Kimi API</a>
      <nav>
        <a href="/">Home</a>
        <a href="/docs">Documentation</a>
        <a href="/models">Models</a>
        <a href="/about">About</a>
        <a href="/login" class="btn-primary">Login</a>
      </nav>
    </div>
  </header>

  <main class="auth-page-wrapper">
    <div class="auth-container">
      <div class="auth-header">
        <h1>Reset Password</h1>
        <p>Enter your email to receive recovery instructions</p>
      </div>

      <div id="alert-box" class="alert"></div>

      <form id="forgot-form" onsubmit="handleForgot(event)">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="john@example.com" required>
        </div>

        <button type="submit" class="btn-submit" id="btn-submit">Send Reset Link</button>
      </form>

      <div class="auth-footer">
        Remember password? <a href="/login">Back to Sign In</a>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-container">
      <span style="font-size: 0.9rem; color: var(--text-muted);">&copy; 2026 Mine Kimi. All rights reserved.</span>
      <div class="status-badge">
        <div class="status-dot"></div>
        <span>API Gateway Online</span>
      </div>
      <div class="footer-links">
        <a href="/docs">Docs</a>
        <a href="/models">Models</a>
        <a href="/about">About</a>
      </div>
    </div>
  </footer>

  <script src="/js/supabase-client.js"></script>
  <script src="/js/auth-guard.js"></script>
  <script src="/js/navbar.js"></script>
  <script>
    async function handleForgot(e) {
      e.preventDefault();
      const alertBox = document.getElementById('alert-box');
      const submitBtn = document.getElementById('btn-submit');
      
      alertBox.className = 'alert';
      alertBox.style.display = 'none';

      submitBtn.innerText = 'Sending...';
      submitBtn.disabled = true;

      const email = document.getElementById('email').value;

      try {
        const client = await getSupabaseClient();
        
        // Trigger password reset email flow
        const { error } = await client.auth.resetPasswordForEmail(email, {
          redirectTo: `${window.location.origin}/auth/callback?type=recovery`
        });

        if (error) throw error;

        // Redirect to login page with success flag
        window.location.href = '/login?reset=success';
      } catch (err) {
        console.error(err);
        alertBox.innerText = err.message || 'Failed to send reset link.';
        alertBox.className = 'alert alert-error';
        alertBox.style.display = 'block';
      } finally {
        submitBtn.innerText = 'Send Reset Link';
        submitBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
