<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password - Mine Kimi API</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <!-- Supabase JS Client CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="glow-container">
    <div class="glow-circle glow-1"></div>
    <div class="glow-circle glow-2"></div>
  </div>

  <header>
    <div class="nav-container">
      <a href="/" class="logo">🚀 Mine Kimi API</a>
      <nav>
        <a href="/">Home</a>
        <a href="/docs">Documentation</a>
        <a href="/models">Models</a>
        <a href="/about">About</a>
        <a href="/login" class="btn-primary">Login</a>
      </nav>
    </div>
  </header>

  <main class="auth-page-wrapper">
    <div class="auth-container">
      <div class="auth-header">
        <h1>New Password</h1>
        <p>Configure a secure new password for your account</p>
      </div>

      <div id="alert-box" class="alert"></div>

      <form id="reset-form" onsubmit="handleReset(event)">
        <div class="form-group">
          <label for="password">New Password</label>
          <input type="password" id="password" placeholder="••••••••" minlength="6" required>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm New Password</label>
          <input type="password" id="confirmPassword" placeholder="••••••••" minlength="6" required>
        </div>

        <button type="submit" class="btn-submit" id="btn-submit">Update Password</button>
      </form>
    </div>
  </main>

  <footer>
    <div class="footer-container">
      <span style="font-size: 0.9rem; color: var(--text-muted);">&copy; 2026 Mine Kimi. All rights reserved.</span>
      <div class="status-badge">
        <div class="status-dot"></div>
        <span>API Gateway Online</span>
      </div>
      <div class="footer-links">
        <a href="/docs">Docs</a>
        <a href="/models">Models</a>
        <a href="/about">About</a>
      </div>
    </div>
  </footer>

  <script src="/js/supabase-client.js"></script>
  <script src="/js/auth-guard.js"></script>
  <script src="/js/navbar.js"></script>
  <script>
    // Security check: Must have active recovery or login session
    window.addEventListener('load', async () => {
      const client = await getSupabaseClient();
      const { data: { session } } = await client.auth.getSession();
      
      // If no session exists, they cannot reset password
      if (!session) {
        window.location.href = '/login?error=unauthorized';
      }
    });

    async function handleReset(e) {
      e.preventDefault();
      const alertBox = document.getElementById('alert-box');
      const submitBtn = document.getElementById('btn-submit');
      
      alertBox.className = 'alert';
      alertBox.style.display = 'none';

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        alertBox.innerText = 'Passwords do not match.';
        alertBox.className = 'alert alert-error';
        alertBox.style.display = 'block';
        return;
      }

      submitBtn.innerText = 'Updating password...';
      submitBtn.disabled = true;

      try {
        const client = await getSupabaseClient();
        
        // Update user password in auth
        const { error } = await client.auth.updateUser({
          password: password
        });

        if (error) throw error;

        // Sign out user to enforce new password login
        await client.auth.signOut();
        window.location.href = '/login?updated=success';
      } catch (err) {
        console.error(err);
        alertBox.innerText = err.message || 'Failed to update password.';
        alertBox.className = 'alert alert-error';
        alertBox.style.display = 'block';
      } finally {
        submitBtn.innerText = 'Update Password';
        submitBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
